<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Ventas Magic</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:#f0f4ff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.top-wave{width:100%;position:fixed;top:0;left:0;z-index:0}
.top-wave svg{display:block;width:100%}
.card{background:#fff;border-radius:28px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(59,91,219,.13);position:relative;z-index:1;margin:0 20px}
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
.logo-icon{width:64px;height:64px;background:#f97316;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:10px;box-shadow:0 4px 16px rgba(249,115,22,.3)}
.logo-title{font-size:20px;font-weight:800;color:#1a1a2e}
.logo-sub{font-size:12px;color:#aaa;font-weight:500}
h2{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.subtitle{font-size:13px;color:#aaa;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:700;color:#666;margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:18px}
.input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4}
input{width:100%;padding:13px 16px 13px 42px;border:1.5px solid #e5e7eb;border-radius:14px;font-family:inherit;font-size:14px;color:#1a1a2e;outline:none;transition:.2s;background:#f8faff}
input:focus{border-color:#3b5bdb;background:#fff}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;opacity:.4;background:none;border:none;padding:0}
.eye-btn:hover{opacity:.8}
.error{background:#fee2e2;color:#ef4444;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#3b5bdb,#6366f1);color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(59,91,219,.3);transition:.2s}
.btn-login:active{opacity:.9;transform:scale(.98)}
</style>
</head>
<body>
<div class="top-wave">
<svg viewBox="0 0 500 160" preserveAspectRatio="none" style="height:220px">
  <path d="M0,0 L0,100 Q125,160 250,100 Q375,40 500,100 L500,0 Z" fill="#3b5bdb" opacity="0.9"/>
  <path d="M0,0 L0,80 Q125,140 250,80 Q375,20 500,80 L500,0 Z" fill="#6366f1" opacity="0.6"/>
</svg>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <div class="logo-title">Pro Ventas Magic</div>
    <div class="logo-sub">Sistema de ventas</div>
  </div>
  <h2>Iniciar sesión</h2>
  <div class="subtitle">Ingresa tus credenciales</div>
  <div class="error" id="error"></div>
  <div>
    <label>Usuario</label>
    <div class="input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b5bdb" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" id="email" placeholder="Tu usuario" autocomplete="off">
    </div>
  </div>
  <div>
    <label>Contraseña</label>
    <div class="input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b5bdb" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
      <button class="eye-btn" onclick="togglePass()" type="button" id="eye-btn">
        <svg id="eye-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <button class="btn-login" onclick="login()">Entrar</button>
</div>
<script>
document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
function togglePass() {
  const inp = document.getElementById('password');
  const svg = document.getElementById('eye-svg');
  if (inp.type === 'password') {
    inp.type = 'text';
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('error');
  err.style.display = 'none';
  if (!email || !password) { err.textContent='Completa todos los campos'; err.style.display='block'; return; }
  try {
    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
    const data = await res.json();
    if (res.ok) { window.location.href = '/'; }
    else { err.textContent = data.error || 'Error al iniciar sesión'; err.style.display='block'; }
  } catch(e) { err.textContent='Error de conexión'; err.style.display='block'; }
}
</script>
</body>
</html>
