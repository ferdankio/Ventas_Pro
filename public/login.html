<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Ventas Magic — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#dce6f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.logo-icon{width:48px;height:48px;background:#f97316;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px}
.logo-text{font-size:18px;font-weight:800;color:#1a1a2e}
.logo-sub{font-size:12px;color:#888;font-weight:400}
h2{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
p{font-size:13px;color:#888;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px}
input{width:100%;padding:13px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-family:inherit;font-size:14px;color:#1a1a2e;outline:none;transition:.2s}
input:focus{border-color:#3b5bdb}
.field{margin-bottom:18px}
.error{background:#fee2e2;color:#ef4444;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
button{width:100%;padding:14px;background:#3b5bdb;color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
button:active{opacity:.9}
.hint{text-align:center;font-size:12px;color:#aaa;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#9783;</div>
    <div><div class="logo-text">Pro Ventas Magic</div><div class="logo-sub">Bienvenido de nuevo</div></div>
  </div>
  <h2>Iniciar sesión</h2>
  <p>Ingresa tus credenciales para continuar</p>
  <div class="error" id="error"></div>
  <div class="field"><label>Usuario</label><input type="text" id="email" placeholder="admin" autocomplete="username"></div>
  <div class="field"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"></div>
  <button onclick="login()">Entrar</button>
  <div class="hint">usuario: admin · contraseña: admin123</div>
</div>
<script>
document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('error');
  err.style.display = 'none';
  if (!email || !password) { err.textContent='Completa todos los campos'; err.style.display='block'; return; }
  try {
    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
    const data = await res.json();
    if (res.ok) { window.location.href = '/'; }
    else { err.textContent = data.error || 'Error al iniciar sesión'; err.style.display='block'; }
  } catch(e) { err.textContent='Error de conexión'; err.style.display='block'; }
}
</script>
</body>
</html>
